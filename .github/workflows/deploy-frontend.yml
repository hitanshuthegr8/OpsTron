name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lov_frontend/opstron-delight/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lov_frontend/opstron-delight/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lov_frontend/opstron-delight

      - name: Build frontend
        run: npm run build
        working-directory: lov_frontend/opstron-delight

      - name: Create GitHub Pages index fallback
        run: |
          cd lov_frontend/opstron-delight
          JS_FILE=$(basename "$(ls dist/client/assets/index-*.js | head -n 1)")
          CSS_FILE=$(basename "$(ls dist/client/assets/styles-*.css | head -n 1)")
          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>OpsTron</title>
              <link rel="stylesheet" href="./assets/${CSS_FILE}" />
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="./assets/${JS_FILE}"></script>
            </body>
          </html>
          EOF
          cp dist/client/index.html dist/client/404.html

      - name: Deploy lov_frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./lov_frontend/opstron-delight/dist/client
          publish_branch: gh-pages
          force_orphan: true
