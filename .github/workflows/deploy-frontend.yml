name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "lov_frontend/opstronic-delight/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lov_frontend/opstronic-delight/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: lov_frontend/opstronic-delight


      - name: Build frontend 
        run: npm run build
        working-directory: lov_frontend/opstronic-delight
        env:
          # Set this repository secret to your deployed Render/FastAPI backend URL.
          VITE_BACKEND_URL: ${{ secrets.OPSTRON_BACKEND_URL }}

      - name: Create GitHub Pages index fallback
        run: |
          cd lov_frontend/opstronic-delight
          node scripts/build-pages-index.mjs

      - name: Deploy lov_frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./lov_frontend/opstronic-delight/dist/client
          publish_branch: gh-pages
          force_orphan: true
